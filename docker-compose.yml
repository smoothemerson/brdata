services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ibge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ibge}
      POSTGRES_DB: ${POSTGRES_DB:-ibge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ibge} -d ${POSTGRES_DB:-ibge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags | grep -q 'llama3.2'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  mcp:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "8001:8001"
    environment:
      IBGE_BASE_URL: ${IBGE_BASE_URL:-https://servicodados.ibge.gov.br/api}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      POSTGRES_URL: ${POSTGRES_URL:-postgresql+asyncpg://ibge:ibge@postgres:5432/ibge}
      MCP_BASE_URL: ${MCP_BASE_URL:-http://mcp:8001}
      IBGE_BASE_URL: ${IBGE_BASE_URL:-https://servicodados.ibge.gov.br/api}
    depends_on:
      postgres:
        condition: service_healthy
      mcp:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  pgdata:
  ollama_data:
