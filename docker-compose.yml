x-ollama: &service-ollama
  image: ollama/ollama:latest
  container_name: ollama
  restart: unless-stopped
  ports:
    - 11434:11434
  volumes:
    - ollama_data:/root/.ollama

x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  container_name: ollama-pull-llama
  volumes:
    - ollama_data:/root/.ollama
  entrypoint: /bin/sh
  environment:
    - OLLAMA_HOST=ollama:11434
  command:
    - "-c"
    - "sleep 3; ollama pull ${OLLAMA_MODEL}"

services:
  mcp:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "8001:8001"
    environment:
      IBGE_BASE_URL: ${IBGE_BASE_URL}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-cpu:
    profiles: ["cpu"]
    <<: *service-ollama

  ollama-gpu-amd:
    profiles: ["gpu-amd"]
    <<: *service-ollama
    image: ollama/ollama:rocm
    devices:
      - "/dev/kfd"
      - "/dev/dri"

  ollama-gpu-nvidia:
    profiles: ["gpu-nvidia"]
    <<: *service-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-pull-llama-cpu:
    profiles: ["cpu"]
    <<: *init-ollama
    depends_on:
      - ollama-cpu

  ollama-pull-llama-gpu-amd:
    profiles: [gpu-amd]
    <<: *init-ollama
    image: ollama/ollama:rocm
    depends_on:
      - ollama-gpu-amd

  ollama-pull-llama-gpu-nvidia:
    profiles: ["gpu-nvidia"]
    <<: *init-ollama
    depends_on:
      - ollama-gpu-nvidia

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      MCP_BASE_URL: ${MCP_BASE_URL:-http://mcp:8001}
      IBGE_BASE_URL: ${IBGE_BASE_URL:-https://servicodados.ibge.gov.br/api}
    depends_on:
      ollama-pull-llama-cpu:
        condition: service_started
        required: false
      ollama-pull-llama-gpu-amd:
        condition: service_started
        required: false
      ollama-pull-llama-gpu-nvidia:
        condition: service_started
        required: false
    restart: on-failure

volumes:
  ollama_data:
